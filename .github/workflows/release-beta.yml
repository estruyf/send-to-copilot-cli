name: BETA Release
on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  MS_URL: "https://marketplace.visualstudio.com/items?itemName=eliostruyf.send-to-copilot-cli"
  VSX_URL: "https://open-vsx.org/extension/eliostruyf/send-to-copilot-cli"

jobs:
  build:
    if: contains(github.event.head_commit.message, '#release')
    uses: ./.github/workflows/release-common.yml
    with:
      build_command: npm run compile
      working_directory: .

  release-ms:
    name: "Release to VSCode Marketplace"
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.event.head_commit.message, '#release')
    environment:
      name: "Microsoft Marketplace"
      url: ${{ env.MS_URL }}

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: vscode-extension-build
          path: extension

      - name: Publish
        if: contains(github.event.head_commit.message, '#release')
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
        working-directory: extension

  release-vsx:
    name: "Release to Open VSX"
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.event.head_commit.message, '#release')

    environment:
      name: "Open VSX"
      url: ${{ env.VSX_URL }}

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: vscode-extension-build
          path: extension

      - name: Publish to open-vsx.org
        if: contains(github.event.head_commit.message, '#release')
        run: npx ovsx publish -p ${{ secrets.OPEN_VSX_PAT }}
        working-directory: extension
